<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INTERACTIVE COMPUTING 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; }
    body { background: #fff; overflow-x: hidden; }
    
    .page-shell { position: relative; width: 100%; }
    
    .hero-panel {
      width: 100%;
      display: block;
    }

    .hero-panel img {
      width: 100%;
      height: auto;
      display: block;
    }

    .hero-title,
    .shapes {
      display: none;
    }
    
    .menu-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(20,20,21,.18);
      background: rgba(255,255,255,.86);
      display: grid;
      place-items: center;
      cursor: pointer;
      padding: 0;
      z-index: 100;
    }
    
    .menu-toggle span {
      display: block;
      width: 18px;
      height: 2px;
      background: #141415;
      border-radius: 999px;
    }
    
    .menu-toggle span:nth-child(2) {
      margin: 6px 0;
    }
    
    .slide-menu {
      position: fixed;
      top: 0;
      right: 0;
      width: min(420px, 100%);
      height: 100vh;
      transform: translateX(100%);
      transition: transform .35s ease;
      background: rgba(18,18,19,.95);
      border-left: 1px solid rgba(255,255,255,.12);
      box-shadow: -32px 0 120px rgba(20,20,21,.18);
      padding: 28px 24px 32px;
      z-index: 10;
      color: #f4f4f5;
      overflow-y: auto;
    }
    
    .slide-menu.open {
      transform: translateX(0);
    }
    
    .menu-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 24px;
    }
    
    .menu-header strong {
      text-transform: uppercase;
      letter-spacing: .3em;
      font-size: .95rem;
      color: #fff;
    }
    
    .close-btn {
      border: none;
      background: transparent;
      color: #fff;
      font-size: 2.2rem;
      line-height: 1;
      cursor: pointer;
    }
    
    .menu-items {
      display: grid;
      gap: 12px;
    }
    
    .menu-items a {
      display: block;
      padding: 16px 18px;
      color: #fff;
      background: rgba(255,255,255,.06);
      border-radius: 18px;
      text-decoration: none;
      font-weight: 700;
      transition: transform .22s ease, background .22s ease;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1rem;
    }
    
    .menu-items a:hover {
      background: rgba(255,255,255,.14);
      transform: translateX(4px);
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <main class="hero-panel">
      <img src="./mainpage-full.png" alt="INTERACTIVE COMPUTING 2026">
    </main>
    
    <button class="menu-toggle" id="menuToggle" aria-label="메뉴 열기">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <aside class="slide-menu" id="slideMenu">
      <div class="menu-header">
        <strong>코드 리스트</strong>
        <button class="close-btn" id="closeMenu" aria-label="메뉴 닫기">×</button>
      </div>
      <nav class="menu-items">
        <a href="page-2.html">2주차 코드 보기</a>
        <a href="page-3.html">3주차 코드 보기</a>
        <a href="page-4.html">4주차 코드 보기</a>
        <a href="page-5.html">5주차 코드 보기</a>
        <a href="page-6.html">6주차 코드 보기</a>
        <a href="page-7.html">7주차 코드 보기</a>
        <a href="page-8.html">8주차 코드 보기</a>
        <a href="page-9.html">9주차 코드 보기</a>
        <a href="page-11.html">11주차 코드 보기</a>
        <a href="page-12.html">12주차 코드 보기</a>
        <a href="page-13.html">13주차 코드 보기</a>
        <a href="page-13-2.html">13-2주차 코드 보기</a>
        <a href="page-14.html">14주차 코드 보기</a>
      </nav>
    </aside>
  </div>

  <script>
    const menuToggle = document.getElementById('menuToggle');
    const slideMenu = document.getElementById('slideMenu');
    const closeMenu = document.getElementById('closeMenu');
    menuToggle.addEventListener('click', () => slideMenu.classList.toggle('open'));
    closeMenu.addEventListener('click', () => slideMenu.classList.remove('open'));
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') slideMenu.classList.remove('open');
    });
  </script>
</body>
</html>
